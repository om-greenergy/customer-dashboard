        return;
      }
      var html=new TextDecoder().decode(keystreamXor(ct,encKey));
      try{ sessionStorage.setItem('dbpw', password); }catch(e){}
      document.open(); document.write(html); document.close();
    }catch(ex){
      go.disabled=false; go.textContent='เข้าสู่ระบบ / Unlock';
      err.textContent='เกิดข้อผิดพลาด: '+ex;
    }
  }, 30);
}
document.getElementById('f').addEventListener('submit', function(){ unlock(document.getElementById('pw').value, false); });
(function(){ try{ var s=sessionStorage.getItem('dbpw'); if(s) unlock(s, true); }catch(e){} })();
</script>
