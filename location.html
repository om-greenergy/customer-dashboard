function b64(s){var bin=atob(s),u=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u;}
function cat(a,b){var o=new Uint8Array(a.length+b.length);o.set(a,0);o.set(b,a.length);return o;}
function utf8(s){return new TextEncoder().encode(s);}

function sha256(bytes){
  var K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  var h0=0x6a09e667,h1=0xbb67ae85,h2=0x3c6ef372,h3=0xa54ff53a,h4=0x510e527f,h5=0x9b05688c,h6=0x1f83d9ab,h7=0x5be0cd19;
  var l=bytes.length, bitLen=l*8, withPad=((((l+8)>>6)+1)<<6);
  var m=new Uint8Array(withPad); m.set(bytes); m[l]=0x80;
  var dv=new DataView(m.buffer);
  dv.setUint32(withPad-8,Math.floor(bitLen/0x100000000)); dv.setUint32(withPad-4,bitLen>>>0);
  function rotr(x,n){return (x>>>n)|(x<<(32-n));}
  var w=new Uint32Array(64),off,i;
  for(off=0;off<withPad;off+=64){
    for(i=0;i<16;i++) w[i]=dv.getUint32(off+i*4);
    for(i=16;i<64;i++){
      var s0=rotr(w[i-15],7)^rotr(w[i-15],18)^(w[i-15]>>>3);
      var s1=rotr(w[i-2],17)^rotr(w[i-2],19)^(w[i-2]>>>10);
      w[i]=(w[i-16]+s0+w[i-7]+s1)|0;
    }
    var a=h0,b=h1,c=h2,d=h3,e=h4,f=h5,g=h6,h=h7,t1,t2;
    for(i=0;i<64;i++){
      var S1=rotr(e,6)^rotr(e,11)^rotr(e,25), ch=(e&f)^((~e)&g);
      t1=(h+S1+ch+K[i]+w[i])|0;
      var S0=rotr(a,2)^rotr(a,13)^rotr(a,22), maj=(a&b)^(a&c)^(b&c);
      t2=(S0+maj)|0;
      h=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
    }
    h0=(h0+a)|0;h1=(h1+b)|0;h2=(h2+c)|0;h3=(h3+d)|0;h4=(h4+e)|0;h5=(h5+f)|0;h6=(h6+g)|0;h7=(h7+h)|0;
  }
  var out=new Uint8Array(32),hs=[h0,h1,h2,h3,h4,h5,h6,h7];
  for(i=0;i<8;i++){out[i*4]=(hs[i]>>>24)&255;out[i*4+1]=(hs[i]>>>16)&255;out[i*4+2]=(hs[i]>>>8)&255;out[i*4+3]=hs[i]&255;}

function hmac(key,msg){
  if(key.length>64) key=sha256(key);
  var k=new Uint8Array(64); k.set(key);
  var ip=new Uint8Array(64),op=new Uint8Array(64),i;
  for(i=0;i<64;i++){ip[i]=k[i]^0x36;op[i]=k[i]^0x5c;}
  return sha256(cat(op, sha256(cat(ip,msg))));
}
function pbkdf2(pw,salt,iters,dklen){
  var out=new Uint8Array(dklen),pos=0,block=1;
  while(pos<dklen){
    var bi=new Uint8Array(4); bi[0]=(block>>>24)&255;bi[1]=(block>>>16)&255;bi[2]=(block>>>8)&255;bi[3]=block&255;
    var u=hmac(pw,cat(salt,bi)), t=u.slice(), i,j;
    for(i=1;i<iters;i++){ u=hmac(pw,u); for(j=0;j<32;j++) t[j]^=u[j]; }
    var take=Math.min(32,dklen-pos); out.set(t.subarray(0,take),pos); pos+=take; block++;
  }
  return out;
}
function keystreamXor(data,encKey){
  var out=new Uint8Array(data.length),ctr=new Uint8Array(8),dv=new DataView(ctr.buffer),block=0,pos,i;
  for(pos=0;pos<data.length;pos+=32){
    dv.setUint32(0,Math.floor(block/0x100000000)); dv.setUint32(4,block>>>0);
    var ks=sha256(cat(encKey,ctr)), end=Math.min(pos+32,data.length);
    for(i=pos;i<end;i++) out[i]=data[i]^ks[i-pos];
    block++;
  }
  return out;
}
function eq(a,b){ if(a.length!==b.length) return false; var d=0,i; for(i=0;i<a.length;i++) d|=a[i]^b[i]; return d===0; }

function unlock(password, silent){
  var err=document.getElementById('err'), go=document.getElementById('go');
  if(!password){ return; }
  go.disabled=true; err.textContent=''; if(!silent){ go.textContent='กำลังปลดล็อก...'; }
  setTimeout(function(){
    try{
      var salt=b64(SALT), ct=b64(CT), mac=b64(MAC);
      var dk=pbkdf2(utf8(password),salt,ITERS,64);
      var encKey=dk.subarray(0,32), macKey=dk.subarray(32,64);
      if(!eq(hmac(macKey,ct), mac)){
        go.disabled=false; go.textContent='เข้าสู่ระบบ / Unlock';
        if(silent){ try{sessionStorage.removeItem('dbpw');}catch(e){} }
        else { err.textContent='รหัสผ่านไม่ถูกต้อง / Wrong password'; }
        return;
      }
      var html=new TextDecoder().decode(keystreamXor(ct,encKey));
      try{ sessionStorage.setItem('dbpw', password); }catch(e){}
      document.open(); document.write(html); document.close();
    }catch(ex){
      go.disabled=false; go.textContent='เข้าสู่ระบบ / Unlock';
      err.textContent='เกิดข้อผิดพลาด: '+ex;
    }
  }, 30);
}
document.getElementById('f').addEventListener('submit', function(){ unlock(document.getElementById('pw').value, false); });
(function(){ try{ var s=sessionStorage.getItem('dbpw'); if(s) unlock(s, true); }catch(e){} })();
